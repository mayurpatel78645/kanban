<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Kanban</title>
</head>
<body>
  <main>
    <h1>Kanban</h1>
    <input type="text">
    <button class="add-text-button">Add Task</button>
    <div class="container">
      <div class="todo-container">
        <h2>ToDo</h2>
        <div class="todo-tasks"></div>
      </div>
      <div class="in-progress-container">
        <h2>In Progress</h2>
        <div class="in-progress-tasks"></div>
      </div>
      <div class="done-container">
        <h2>Done</h2>
        <div class="done-tasks"></div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
